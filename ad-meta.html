<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>jagger meta ad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1080px; }
  body {
    font-family:'Patrick Hand', cursive;
    color:#1a1a1a;
    background-color:#fdfdfb;
    background-image:
      linear-gradient(to right, transparent 92px, #e7b0b0 92px, #e7b0b0 95px, transparent 95px),
      repeating-linear-gradient(#fdfdfb 0px, #fdfdfb 47px, #dcdcdc 47px, #dcdcdc 48px);
    padding:54px 70px 54px 130px;
    display:flex; flex-direction:column;
    position:relative; overflow:hidden;
  }
  .eyebrow { font-family:'Caveat',cursive; font-size:44px; color:#555; transform:rotate(-1.5deg); margin-bottom:4px; }
  h1 {
    font-family:'Caveat',cursive; font-weight:700;
    font-size:134px; line-height:0.9; letter-spacing:-1px;
  }
  h1 .free { position:relative; display:inline-block; }
  h1 .free svg { position:absolute; left:-8px; bottom:-14px; width:calc(100% + 16px); height:26px; }
  h1 .free svg path { stroke:#1a1a1a; stroke-width:5; fill:none; stroke-linecap:round; }
  .sub { font-size:50px; margin-top:18px; color:#222; }

  .box {
    border:4px solid #1a1a1a;
    border-radius:255px 15px 225px 15px / 15px 225px 15px 255px;
    padding:26px 40px; margin-top:32px; background:rgba(255,255,255,0.5);
  }
  ul { list-style:none; }
  ul li { font-size:48px; padding-left:70px; position:relative; margin-bottom:16px; line-height:1.15; }
  ul li:last-child { margin-bottom:0; }
  ul li::before {
    content:''; position:absolute; left:2px; top:6px; width:38px; height:38px;
    border:4px solid #1a1a1a; border-radius:155px 12px 155px 12px / 12px 155px 12px 155px;
  }
  ul li::after {
    content:'✓'; position:absolute; left:6px; top:-8px;
    font-family:'Caveat',cursive; font-weight:700; font-size:60px;
  }

  .cta-row { margin-top:52px; display:flex; flex-direction:column; align-items:flex-start; gap:26px; }
  .btn {
    font-family:'Caveat',cursive; font-weight:700; font-size:66px; color:#fff; background:#1a1a1a;
    border-radius:225px 18px 255px 18px / 18px 255px 18px 225px;
    padding:18px 54px; box-shadow:6px 7px 0 rgba(26,26,26,0.35);
    white-space:nowrap;
  }
  .url { font-family:'Caveat',cursive; font-size:56px; color:#333; padding-left:10px; }
  .url b { border-bottom:3px solid #1a1a1a; }

  .doodle-arrow { position:absolute; right:120px; top:430px; width:150px; height:150px; transform:rotate(8deg); }
  .doodle-arrow path { stroke:#1a1a1a; stroke-width:5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .tape { position:absolute; top:44px; right:250px; width:150px; height:44px; background:rgba(180,180,180,0.35); transform:rotate(-4deg); border-left:1px dashed #aaa; border-right:1px dashed #aaa; }
</style>
</head>
<body>
  <div class="tape"></div>
  <div class="eyebrow">psst, indie artists</div>
  <h1>5,000 <span class="free">free<svg viewBox="0 0 200 26"><path d="M4 14 C 40 4, 80 22, 120 12 S 180 6, 196 15"/></svg></span><br>tiktok views</h1>
  <div class="sub">for your song. no really, free.</div>

  <div class="box">
    <ul>
      <li>real listeners, almost all US</li>
      <li>100% organic. no bots. ever.</li>
      <li>no payment, no signup, no catch</li>
    </ul>
  </div>

  <svg class="doodle-arrow" viewBox="0 0 150 150"><path d="M140 12 C 110 40, 60 30, 30 120 M30 120 l -4 -30 M30 120 l 28 -8"/></svg>

  <div class="cta-row">
    <div class="btn">send me your song →</div>
    <div class="url"><b>jagger.soundlift.club</b></div>
  </div>
</body>
</html>
